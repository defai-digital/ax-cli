# AI Model Configuration
# Defines available models and their capabilities

default_model: glm-4.6

models:
  glm-4.6:
    name: glm-4.6
    context_window: 200000  # 200K tokens
    max_output_tokens: 128000  # 128K max output
    default_max_tokens: 8192  # Conservative default
    supports_thinking: true
    default_temperature: 0.7
    temperature_range:
      min: 0.6
      max: 1.0
    token_efficiency: 1.3  # 30% more efficient

  grok-code-fast-1:
    name: grok-code-fast-1
    context_window: 128000  # 128K tokens
    max_output_tokens: 4096
    default_max_tokens: 1536
    supports_thinking: false
    default_temperature: 0.7
    temperature_range:
      min: 0.0
      max: 2.0
    token_efficiency: 1.0

  glm-4-air:
    name: glm-4-air
    context_window: 128000
    max_output_tokens: 8192
    default_max_tokens: 4096
    supports_thinking: false
    default_temperature: 0.7
    temperature_range:
      min: 0.6
      max: 1.0
    token_efficiency: 1.15

  glm-4-airx:
    name: glm-4-airx
    context_window: 8192
    max_output_tokens: 8192
    default_max_tokens: 2048
    supports_thinking: false
    default_temperature: 0.7
    temperature_range:
      min: 0.6
      max: 1.0
    token_efficiency: 1.1
